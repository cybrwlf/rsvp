<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event RSVP</title>
    <style>
        :root {
            --primary-color: #d4a373; 
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 450px;
            padding: 20px;
        }

        #no-access {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .card {
            display: none; 
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; font-weight: 300; margin-bottom: 25px; color: var(--primary-color); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #555; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px; 
            background: #fafafa;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        #success { display: none; text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="no-access">
        <h2>Private Event</h2>
        <p>Please use the link provided in your invitation.</p>
    </div>

    <div id="rsvp-card" class="card">
        <h2>Event RSVP</h2>
        
        <form id="wedding-form">
            <div class="form-group">
                <label>Can you attend?</label>
                <select id="field_attend" required>
                    <option value="" disabled selected>Select an option...</option>
                    <option value="Yes, I'll be there">Yes, I'll be there</option>
                    <option value="Sorry, can't make it">Sorry, can't make it</option>
                    <option value="Yes, We'll be there (+1)">Yes, We'll be there (+1)</option>
                </select>
            </div>

            <div class="form-group">
                <label>What are the name(s) of people attending?</label>
                <input type="text" id="field_names" placeholder="Your Name(s)" required>
            </div>

            <div class="form-group">
                <label>Do you have any accessibility requirements?</label>
                <input type="text" id="field_access" placeholder="e.g. Wheelchair, dietary needs, etc.">
            </div>

            <div class="form-group">
                <label>Song Requests</label>
                <input type="text" id="field_songs" placeholder="What will get you on the dance floor?">
            </div>

            <button type="submit" id="submit-btn">Submit RSVP</button>
        </form>
    </div>

    <div id="success">
        <h2>Success!</h2>
        <p>Your response has been recorded. See you there!</p>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const SECRET_GUEST_CODE = "10164218201216610";
    const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSf-1UR70Q6ZCfP7X11o4fDdjp_eh9PsmYlOa7OoeVKJk2vAdg/formResponse";

    // Mapped Entry IDs from your link
    const ID_ATTEND = "entry.877086558";
    const ID_NAMES  = "entry.1498135098";
    const ID_ACCESS = "entry.1424661284";
    const ID_SONGS  = "entry.2606285";

    // 2. BOUNCER LOGIC
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('guest') === SECRET_GUEST_CODE) {
        document.getElementById('rsvp-card').style.display = 'block';
        document.getElementById('no-access').style.display = 'none';
    }

    // 3. SUBMISSION LOGIC
    document.getElementById('wedding-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append(ID_ATTEND, document.getElementById('field_attend').value);
        formData.append(ID_NAMES,  document.getElementById('field_names').value);
        formData.append(ID_ACCESS, document.getElementById('field_access').value);
        formData.append(ID_SONGS,  document.getElementById('field_songs').value);

        fetch(GOOGLE_FORM_ACTION, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        }).then(() => {
            document.getElementById('rsvp-card').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }).catch(() => {
            alert("Error submitting form. Please check your connection.");
            btn.innerText = "Submit RSVP";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
