<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding RSVP</title>
    <style>
        :root {
            --primary-color: #d4a373; /* Elegant Gold/Tan */
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px;
        }

        /* Access Denied Styling */
        #no-access {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Form Card Styling */
        .card {
            display: none; /* Hidden until URL check passes */
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; font-weight: 300; margin-bottom: 25px; color: var(--primary-color); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #666; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px; /* Prevents iOS auto-zoom */
            background: #fafafa;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        button:active { opacity: 0.8; }

        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        /* Loading state */
        .loading { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <div id="no-access">
        <h1 style="font-size: 40px; margin-bottom: 10px;">💌</h1>
        <h2>Private Invitation</h2>
        <p>Please use the link provided in your invitation.</p>
    </div>

    <div id="rsvp-card" class="card">
        <h2>Kindly Respond</h2>
        
        <form id="wedding-form">
            <div class="form-group">
                <label>Can you attend?</label>
                <select id="field_attend" required>
                    <option value="" disabled selected>Select an option...</option>
                    <option value="Joyfully Accept">Joyfully Accept</option>
                    <option value="Joyfully Accept (+1)">Joyfully Accept (+1)</option>
                    <option value="Regretfully Decline">Regretfully Decline</option>
                </select>
            </div>

            <div class="form-group">
                <label>Name(s) of guest(s)</label>
                <input type="text" id="field_names" placeholder="Your Name(s)" required>
            </div>

            <div class="form-group">
                <label>Do you have any accessibility requirements?</label>
                <input type="text" id="field_access" placeholder="e.g. Wheelchair, dietary needs, etc.">
            </div>

            <div class="form-group">
                <label>Song Requests</label>
                <input type="text" id="field_songs" placeholder="What will get you on the dance floor?">
            </div>

            <button type="submit" id="submit-btn">Submit RSVP</button>
        </form>
    </div>

    <div id="success" class="success-message">
        <h1 style="font-size: 40px;">🥂</h1>
        <h2>Thank You!</h2>
        <p>Your response has been received.</p>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const SECRET_GUEST_CODE = "10164218201216610";
    const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSf-1UR70Q6ZCfP7X11o4fDdjp_eh9PsmYlOa7OoeVKJk2vAdg/formResponse";

    // 2. CHECK THE URL FOR THE GUEST KEY
    const urlParams = new URLSearchParams(window.location.search);
    const ID_ATTEND = "entry.877086558";
    const ID_NAMES  = "entry.1498135098";
    const ID_ACCESS = "entry.1424661284";
    const ID_SONGS  = "entry.2606285";


    if (urlParams.get('guest') === SECRET_GUEST_CODE) {
        document.getElementById('rsvp-card').style.display = 'block';
        document.getElementById('no-access').style.display = 'none';
    }
    // 3. HANDLE FORM SUBMISSION (SILENTLY)
    document.getElementById('wedding-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        // Prepare the data to send to Google
        const url = new URL(GOOGLE_FORM_ACTION);
        url.searchParams.append(ID_ATTEND, document.getElementById('field_attend').value);
        url.searchParams.append(ID_NAMES, document.getElementById('field_names').value);
        url.searchParams.append(ID_ACCESS, document.getElementById('field_access').value);
        url.searchParams.append(ID_SONGS, document.getElementById('field_songs').value);
        // Send via Fetch (mode: 'no-cors' allows us to send to Google without issues)
        fetch(url, {
            method: 'POST',
            mode: 'no-cors'
        }).then(() => {
            // Success! Hide form, show thank you
            document.getElementById('rsvp-card').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }).catch(() => {
            alert("Error submitting. Please try again.");
            btn.innerText = "Submit RSVP";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
