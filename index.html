<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding RSVP</title>
    <style>
        :root {
            --primary-color: #d4a373; /* Elegant Gold/Tan */
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px;
        }

        /* Access Denied Styling */
        #no-access {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Form Card Styling */
        .card {
            display: none; /* Hidden until URL check passes */
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; font-weight: 300; margin-bottom: 25px; color: var(--primary-color); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #666; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px; /* Prevents iOS auto-zoom */
            background: #fafafa;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        button:active { opacity: 0.8; }

        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        /* Loading state */
        .loading { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <div id="no-access">
        <h1 style="font-size: 40px; margin-bottom: 10px;">💌</h1>
        <h2>Private Invitation</h2>
        <p style="color: #888; line-height: 1.5;">Please use the personalized link or QR code from your physical invitation to access the RSVP form.</p>
    </div>

    <div id="rsvp-card" class="card">
        <h2>Kindly Respond</h2>
        
        <form id="wedding-form">
            <div class="form-group">
                <input type="text" id="entry_1498135098" name="entry.1498135098" placeholder="Your Full Name" required>
            </div>

            <div class="form-group">
                <input type="email" id="entry_1424661284" name="entry.1424661284" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <select name="attending" id="attending" required onchange="updateAttendance()">
                    <option value="" disabled selected>Will you be attending?</option>
                    <option value="Joyfully Accept">Joyfully Accept</option>
                    <option value="Regretfully Decline">Regretfully Decline</option>
                </select>
            </div>

            <div class="form-group">
                <textarea id="entry_2606285" name="entry.2606285" placeholder="Song requests or advice for the couple?" rows="4"></textarea>
            </div>

            <button type="submit" id="submit-btn">Send RSVP</button>
        </form>
    </div>

    <div id="success" class="success-message">
        <h1 style="font-size: 40px;">🥂</h1>
        <h2>Thank You!</h2>
        <p>Your response has been received. We can't wait to celebrate!</p>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const SECRET_GUEST_CODE = "10164218201216610";
    const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSf-1UR70Q6ZCfP7X11o4fDdjp_eh9PsmYlOa7OoeVKJk2vAdg/formResponse";

    // 2. CHECK THE URL FOR THE GUEST KEY
    const urlParams = new URLSearchParams(window.location.search);
    const guestCode = urlParams.get('guest');

    const rsvpCard = document.getElementById('rsvp-card');
    const noAccess = document.getElementById('no-access');

    if (guestCode === SECRET_GUEST_CODE) {
        rsvpCard.style.display = 'block';
        noAccess.style.display = 'none';
    }

    // 3. HANDLE FORM SUBMISSION (SILENTLY)
    const form = document.getElementById('wedding-form');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Sending...";
        btn.classList.add('loading');

        // Prepare the data to send to Google
        const formData = new FormData();
        formData.append('entry.1498135098', document.getElementById('entry_1498135098').value);
        formData.append('entry.1424661284', document.getElementById('entry_1424661284').value);
        
        // We combine Attendance + Advice into the third box for simplicity
        const attendance = document.getElementById('attending').value;
        const advice = document.getElementById('entry_2606285').value;
        const combinedNote = `Attending: ${attendance} | Note: ${advice}`;
        
        formData.append('entry.2606285', combinedNote);

        // Send via Fetch (mode: 'no-cors' allows us to send to Google without issues)
        fetch(GOOGLE_FORM_ACTION, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        }).then(() => {
            // Success! Hide form, show thank you
            rsvpCard.style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }).catch(error => {
            alert("Something went wrong. Please try again!");
            btn.innerText = "Send RSVP";
            btn.classList.remove('loading');
        });
    });
</script>

</body>
</html>
